<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AI Smart Watch Landing Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .hero {
      text-align: center;
      padding: 50px;
      background: linear-gradient(to right, #6a11cb, #2575fc);
      color: white;
    }

    .hero img {
      width: 300px;
      margin-top: 20px;
      border-radius: 10px;
    }

    .section {
      padding: 40px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #f4f4f4;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Smart Watch Store</h1>
  </header>

  <section class="hero">
    <h2>Upgrade Your Lifestyle with Smart Watches</h2>
    <p>Track fitness, stay connected, and look stylish.</p>

    <img src="https://images.unsplash.com/photo-1579586337278-3befd40fd17a?q=80&w=1172&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
  </section>

  <section class="section">
    <h2>Features</h2>

    <div class="cards">
      <div class="card">
        <h3>Fitness Tracking</h3>
        <p>Monitor your health easily</p>
      </div>

      <div class="card">
        <h3>Stylish Design</h3>
        <p>Looks premium and modern</p>
      </div>

      <div class="card">
        <h3>Battery Life</h3>
        <p>Long-lasting performance</p>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 Smart Watch Store</p>
  </footer>

</body>
</html>
