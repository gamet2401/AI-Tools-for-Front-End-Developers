<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Startup Landing Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
    }

    /* Navbar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #111;
      color: white;
    }

    nav h2 {
      margin: 0;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav ul li {
      cursor: pointer;
    }

    /* Hero Section */
    .hero {
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(to right, #3c055b, #684406);
      color: rgb(242, 237, 237);
      padding: 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero button {
      padding: 10px 20px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    /* Features */
    .features {
      padding: 50px;
      text-align: center;
    }

    .feature-box {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      padding: 20px;
      border: 1px solid #ddd;
      width: 200px;
      border-radius: 10px;
    }

    /* Footer */
    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav>
    <h2>AI Startup</h2>
    <ul>
      <li>Home</li>
      <li>Features</li>
      <li>Contact</li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Build Any Thing Useing AI</h1>
    <p>Modern Artificial Intelligence</p>
    <button>Let  Started</button>
  </section>

  <!-- Features -->
  <section class="features">
    <h2>Features</h2>

    <div class="feature-box">
      <div class="card">
         Easy Development
      </div>

      <div class="card">
        Use AI
      </div>

      <div class="card">
        Coustem you want
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>@ 2026 AI wale</p>
  </footer>

</body>
</html>
